engines:
  - name: google
    engine: google
    shortcut: go
    weight: 4

  - name: bing
    engine: bing
    shortcut: bi
    weight: 1
    disabled: true

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    weight: 2
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    weight: 2
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    weight: 3
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    weight: 1
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mjk
    weight: 1
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    weight: 4
    display_type: ["infobox"]
    categories: [general]

  - name: github
    engine: github
    shortcut: gh
    weight: 2

  - name: github code
    engine: github_code
    shortcut: ghc
    weight: 2
    disabled: true
    ghc_auth:
      type: "none"
      token: "token"
    ghc_highlight_matching_lines: true
    ghc_strip_new_lines: true
    ghc_strip_whitespace: false
    timeout: 10.0

  - name: gitlab
    engine: gitlab
    shortcut: gl
    weight: 2
    base_url: https://gitlab.com
    disabled: true
    about:
      website: https://gitlab.com/
      wikidata_id: Q16639197

  - name: reddit
    engine: reddit
    shortcut: re
    weight: 2
    page_size: 25

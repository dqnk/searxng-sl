    - (.*\.)?people\.com$
    - (.*\.)?usmagazine\.com$
    - (.*\.)?intouchweekly\.com$
    - (.*\.)?closerweekly\.com$
    - (.*\.)?lifeandstylemag\.com$
    - (.*\.)?firstforwomen\.com$
    - (.*\.)?womansworld\.com$
    - (.*\.)?scarymommy\.com$
    - (.*\.)?romper\.com$
    - (.*\.)?fatherly\.com$
    - (.*\.)?elitedaily\.com$
    - (.*\.)?bustle\.com$
    - (.*\.)?inverse\.com$
    - (.*\.)?mic\.com$
    - (.*\.)?nylon\.com$
    - (.*\.)?thespruce\.com$
    - (.*\.)?thespruceeats\.com$
    - (.*\.)?thesprucepets\.com$
    - (.*\.)?treehugger\.com$
    - (.*\.)?dailyom\.com$
    - (.*\.)?byrdie\.com$
    - (.*\.)?mydomaine\.com$
    - (.*\.)?brides\.com$
    - (.*\.)?instyle\.com$
    - (.*\.)?shape\.com$
    - (.*\.)?self\.com$
    - (.*\.)?allure\.com$

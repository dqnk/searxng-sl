use_default_settings: true

server:
  limiter: false
  image_proxy: true

search:
  languages:
    - sl
    - sl-SI
    - en
    - en-US
  formats:
    - html
    - csv
    - json
    - rss

ui:
  static_use_hash: true

hostnames:
  high_priority:
    # Reference & encyclopedias
    - (.*\.)?wikipedia\.org$
    - (.*\.)?wiktionary\.org$
    - (.*\.)?wikimedia\.org$
    - (.*\.)?britannica\.com$

    # Q&A / Stack Exchange network
    - (.*\.)?stackoverflow\.com$
    - (.*\.)?stackexchange\.com$
    - (.*\.)?superuser\.com$
    - (.*\.)?serverfault\.com$
    - (.*\.)?askubuntu\.com$
    - (.*\.)?mathoverflow\.net$

    # Developer docs & communities
    - (.*\.)?github\.com$
    - (.*\.)?gitlab\.com$
    - (.*\.)?mozilla\.org$
    - (.*\.)?readthedocs\.io$
    - (.*\.)?readthedocs\.org$
    - (.*\.)?python\.org$
    - (.*\.)?rust-lang\.org$
    - (.*\.)?golang\.org$
    - (.*\.)?go\.dev$
    - (.*\.)?kernel\.org$
    - (.*\.)?archlinux\.org$
    - (.*\.)?debian\.org$
    - (.*\.)?ubuntu\.com$
    - (.*\.)?freebsd\.org$
    - (.*\.)?gnu\.org$
    - (.*\.)?postgresql\.org$

    # Tech news & discussion
    - (.*\.)?news\.ycombinator\.com$
    - (.*\.)?lobste\.rs$
    - (.*\.)?reddit\.com$
    - (.*\.)?arstechnica\.com$

    # Science & academia
    - (.*\.)?arxiv\.org$
    - (.*\.)?nature\.com$
    - (.*\.)?science\.org$
    - (.*\.)?sciencedirect\.com$
    - (.*\.)?springer\.com$
    - (.*\.)?ieee\.org$
    - (.*\.)?acm\.org$
    - (.*\.)?plos\.org$
    - (.*\.)?ncbi\.nlm\.nih\.gov$
    - (.*\.)?pubmed\.ncbi\.nlm\.nih\.gov$
    - (.*\.)?who\.int$
    - (.*\.)?nasa\.gov$
    - (.*\.)?nist\.gov$

    # Long-form / writing / books
    - (.*\.)?gutenberg\.org$
    - (.*\.)?archive\.org$

    # News (quality wire / long-form)
    - (.*\.)?reuters\.com$
    - (.*\.)?apnews\.com$
    - (.*\.)?bbc\.com$
    - (.*\.)?bbc\.co\.uk$

  low_priority:
    # Low-quality tutorial/SEO sites
    - (.*\.)?w3schools\.com$
    - (.*\.)?geeksforgeeks\.org$
    - (.*\.)?tutorialspoint\.com$
    - (.*\.)?javatpoint\.com$
    - (.*\.)?programiz\.com$

    # Low-quality Q&A
    - (.*\.)?quora\.com$
    - (.*\.)?answers\.com$
    - (.*\.)?chegg\.com$
    - (.*\.)?coursehero\.com$
    - (.*\.)?brainly\.com$

    # Content farms / listicle sites
    - (.*\.)?wikihow\.com$
    - (.*\.)?ehow\.com$
    - (.*\.)?buzzfeed\.com$
    - (.*\.)?mashable\.com$
    - (.*\.)?makeuseof\.com$
    - (.*\.)?lifehacker\.com$
    - (.*\.)?lifewire\.com$
    - (.*\.)?digitaltrends\.com$

    # Aggregators / scrapers / mirrors
    - (.*\.)?slideshare\.net$
    - (.*\.)?scribd\.com$
    - (.*\.)?academia\.edu$
    - (.*\.)?researchgate\.net$

    # Stack Overflow scrapers
    - (.*\.)?9to5answer\.com$
    - (.*\.)?newbedev\.com$
    - (.*\.)?codegrepper\.com$
    - (.*\.)?programcreek\.com$
    - (.*\.)?bleepcoder\.com$
    - (.*\.)?solveforum\.com$
    - (.*\.)?appsloveworld\.com$
    - (.*\.)?educba\.com$
    - (.*\.)?csdn\.net$

    # GitHub scrapers
    - (.*\.)?giters\.com$
    - (.*\.)?githubplus\.com$
    - (.*\.)?geekrepos\.com$
    - (.*\.)?libhunt\.com$
    - (.*\.)?issuehint\.com$

    # Health SEO
    - (.*\.)?healthline\.com$
    - (.*\.)?webmd\.com$
    - (.*\.)?medicalnewstoday\.com$
    - (.*\.)?everydayhealth\.com$
    - (.*\.)?verywellhealth\.com$
    - (.*\.)?verywellmind\.com$
    - (.*\.)?verywellfit\.com$
    - (.*\.)?verywellfamily\.com$

    # Tabloid / low-quality news
